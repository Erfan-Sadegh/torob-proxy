jobs:
  darkube_build_worker:
    container:
      image: hamravesh/darkube-cli:v1.1
      options: --user root
    env:
      IMAGE_NAME: registry.hamdocker.ir/erfanclash20178-calm-moon/torob-proxy
      DOCKER_AUTH_CONFIG: ${{ secrets.DOCKER_AUTH_CONFIG }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout commit
        uses: actions/checkout@v4
      - name: darkube-cli build and push
        run: 'darkube build --push -t "$IMAGE_NAME:${GITHUB_SHA:0:7}" -t "$IMAGE_NAME:${GITHUB_REF_NAME}" --docker-auth-config "$DOCKER_AUTH_CONFIG" --workdir . --file ./Dockerfile --build-context .'

  darkube_build_gateway:
    container:
      image: hamravesh/darkube-cli:v1.1
      options: --user root
    env:
      IMAGE_NAME: registry.hamdocker.ir/erfanclash20178-calm-moon/torob-proxy-gateway
      DOCKER_AUTH_CONFIG: ${{ secrets.DOCKER_AUTH_CONFIG }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout commit
        uses: actions/checkout@v4
      - name: darkube-cli build and push
        run: 'darkube build --push -t "$IMAGE_NAME:${GITHUB_SHA:0:7}" -t "$IMAGE_NAME:${GITHUB_REF_NAME}" --docker-auth-config "$DOCKER_AUTH_CONFIG" --workdir . --file ./Dockerfile.gateway --build-context .'
'on':
  push:
    branches:
      - main
