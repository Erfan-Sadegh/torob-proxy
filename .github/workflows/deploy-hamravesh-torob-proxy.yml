jobs:
  darkube_build_torob_proxy_erfanclash20178_calm_moon_hamravesh_c13:
    container:
      image: hamravesh/darkube-cli:v1.1
      options: --user root
    env:
      IMAGE_NAME: torob-proxy
      DOCKER_AUTH_CONFIG: ${{ secrets.DOCKER_AUTH_CONFIG }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout commit
        uses: actions/checkout@v4
      - name: darkube-cli build and push
        run: 'darkube build --push -t "$IMAGE_NAME:${GITHUB_SHA:0:7}" -t "$IMAGE_NAME:${GITHUB_REF_NAME}" --docker-auth-config "$DOCKER_AUTH_CONFIG" --workdir . --file ./Dockerfile --build-context .'
  darkube_deploy_torob_proxy_erfanclash20178_calm_moon_hamravesh_c13:
    container: hamravesh/darkube-cli:v1.1
    needs: darkube_build_torob_proxy_erfanclash20178_calm_moon_hamravesh_c13
    runs-on: ubuntu-latest
    steps:
      - name: darkube-cli deploy
        run: 'darkube deploy --token ${{secrets.DEPLOY_TOKEN_TOROB_PROXY_ERFANCLASH20178_CALM_MOON_HAMRAVESH_C13}} --app-id ${{secrets.APP_ID_TOROB_PROXY_ERFANCLASH20178_CALM_MOON_HAMRAVESH_C13}} --image-tag ${GITHUB_SHA:0:7} --job-id ${GITHUB_RUN_ID}'
'on':
  push:
    branches:
      - main
